name: 'olist_ben'
version: '1.0.0'
config-version: 2

profile: 'olist_ben'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# ── Medallion architecture ──────────────────────────────────────
# Bronze : olist_raw        — raw CSV data loaded by Meltano via GCS
# Silver : olist_silver_ben — cleaned, typed, PII-masked staging tables
# Gold   : olist_gold_ben   — star schema mart tables for BI
#
# The generate_schema_name macro (macros/) ensures +schema values are
# used as-is, not appended to the target dataset name.

models:
  olist_ben:
    staging:
      +materialized: table
      +schema: olist_silver_ben
    marts:
      +materialized: table
      +schema: olist_gold_ben
